name: Deploy Backend to EC2

# Runs on a self-hosted runner installed ON the EC2 box.
# No SSH / no secrets needed — it deploys locally with zero downtime.
on:
  push:
    branches: [master]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy on EC2 (zero-downtime)
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        run: |
          set -e
          cd ~/hackon
          git fetch origin master
          git reset --hard origin/master

      - name: Install dependencies
        run: |
          cd ~/hackon/backend
          npm install

      - name: Generate Prisma client
        run: |
          cd ~/hackon/backend
          npx prisma generate

      - name: Sync database schema (non-destructive)
        run: |
          cd ~/hackon/backend
          npx prisma db push || echo "⚠️ prisma db push skipped/failed — review manually if schema changed"

      - name: Zero-downtime reload (PM2)
        run: |
          cd ~/hackon/backend
          pm2 reload reloop-api --update-env || pm2 start ecosystem.config.js
          pm2 save
          pm2 status
